<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>💖 Gửi đến em 💖</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Background -->
<div class="background">

    <span class="floating floating1">🌸</span>
    <span class="floating floating2">💖</span>
    <span class="floating floating3">✨</span>
    <span class="floating floating4">💕</span>
    <span class="floating floating5">🩷</span>

</div>

<!-- Main -->
<main class="container">

    <section class="card">

        <div class="emoji">
            🥰
        </div>

        <h1>
            Xin chào bạn nhỏ
        </h1>

        <p class="question">
            Em có muốn đi hẹn hò cùng tớ không?
        </p>

        <div class="buttons">

            <button
                    id="yesBtn"
                    class="btn yes-btn">

                Được chứ!! ❤️

            </button>
            <button
                    id="noBtn"
                    class="btn no-btn">

                Không đâu 🙈

            </button>

        </div>
    </section>


</main>

<!-- Heart Animation -->
<div id="heart-container"></div>

<!-- Music (tùy chọn, có thể bỏ nếu chưa dùng) -->
<!--
<audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>
-->

<script src="js/index.js"></script>

</body>

</html>
